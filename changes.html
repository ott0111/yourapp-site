<!doctype html>
<html>
<head>
<title>System Changes — YZY Tweaks</title>

<style>
:root{
  --bg:#07040d;
  --panel:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.10);
  --text:#eae6ff;
  --muted:rgba(234,230,255,.72);
  --accent:#a855f7;
  --accent2:#7c3aed;
  --shadow:0 18px 60px rgba(0,0,0,.55);
  --radius:18px;
}

body{
  margin:0;
  font-family:system-ui;
  background:
  radial-gradient(1000px 700px at 20% -10%, rgba(168,85,247,.20), transparent 60%),
  radial-gradient(900px 600px at 90% 10%, rgba(124,58,237,.18), transparent 60%),
  var(--bg);
  color:var(--text);
  padding:30px;
}

/* HOME BUTTON */
.home-btn{
  display:inline-block;
  margin-bottom:25px;
  padding:10px 20px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  text-decoration:none;
  font-weight:700;
  transition:.25s ease;
  box-shadow:0 6px 20px rgba(124,58,237,.4);
}

.home-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(124,58,237,.6);
}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

h1{
  margin-top:0;
}
</style>
</head>

<body>

<a href="index.html" class="home-btn">← Back to Home</a>

<h1>What The Software Changes</h1>

<div class="card">
<h2>System Restore Point</h2>
<p style="color:var(--muted)">Automatically created before tweaks.</p>
</div>

<div class="card">
<h2>Performance Profiles</h2>
<p style="color:var(--muted)">Optimizes Windows power and background behavior.</p>
</div>

<div class="card">
<h2>Network Optimization</h2>
<p style="color:var(--muted)">Optional gaming-focused latency tuning.</p>
</div>

</body>
</html>
